# 主题配置
remote_theme: just-the-docs/just-the-docs

# 站点设置
title: open-admin 文档
description: open-admin 项目官方文档
baseurl: ""
url: "https://jiangood.github.io"

# 导航菜单
nav:
  - title: 项目概述
    children:
      - title: README
        url: /../README.md
      - title: 快速开始
        url: /quick-start.html
      - title: 架构设计
        url: /architecture.html
  - title: 前端文档
    children:
      - title: 组件库
        url: /frontend/components.html
      - title: 字段组件
        url: /frontend/field-components.html
      - title: 工具类
        url: /frontend/utils.html
  - title: 后端文档
    children:
      - title: 数据规范
        url: /backend/data-spec.html
      - title: 工具类
        url: /backend/utils.html
      - title: 注解
        url: /backend/annotations.html
      - title: 验证器
        url: /backend/validators.html
  - title: 开发指南
    children:
      - title: 编码规范
        url: /guide/coding-standard.html
      - title: 智能体使用
        url: /guide/agent.html

# 搜索设置
search_enabled: true

# 代码高亮
markdown:
  highlighter: rouge
  parser: kramdown
  input: GFM
  hard_wrap: false

# 插件
plugins:
  - jekyll-default-layout
  - jekyll-titles-from-headings
  - jekyll-relative-links
